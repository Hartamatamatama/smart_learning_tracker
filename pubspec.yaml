name: smart_learning_tracker
description: "Smart Learning Tracker — aplikasi self-regulated learning dengan timer, ambient sound, jurnal mood, dan analisis AI."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase — backend, auth, database
  supabase_flutter: ^2.8.4

  # Environment variables
  flutter_dotenv: ^5.2.1

  # State management — Riverpod dipilih karena:
  # compile-safe (error di compile time, bukan runtime), tidak perlu BuildContext,
  # dan lebih scalable untuk fitur async seperti fetch sesi + AI report.
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Audio — just_audio lebih stabil untuk looping & background playback di Android + Web
  just_audio: ^0.9.42

  # Chart untuk visualisasi durasi/mood
  fl_chart: ^0.70.2

  # HTTP client — dio dipilih karena lebih ergonomis untuk interceptor & error handling
  # saat memanggil OpenRouter API
  dio: ^5.8.0+1

  # Date/time formatting
  intl: ^0.20.2

  # UUID generator (untuk ID lokal sebelum sync ke Supabase)
  uuid: ^4.5.1

  # Shared preferences (persist preferensi ringan seperti tema)
  shared_preferences: ^2.3.5

  # Routing — go_router adalah package routing resmi dari Flutter team,
  # mendukung deep linking, redirect logic, dan type-safe routes.
  go_router: ^14.8.1

  # Foreground service Android untuk timer belajar.
  # Dipilih flutter_foreground_task (bukan flutter_background_service) karena:
  # - Punya dukungan native untuk notifikasi persisten + tombol aksi
  #   (Pause/Resume/Stop) langsung di notifikasi — kebutuhan inti fitur ini.
  # - Menjalankan callback di isolate khusus yang tetap hidup saat app
  #   di-background / layar dikunci, sehingga countdown tidak freeze.
  # - Maintenance aktif & API stabil untuk kasus timer.
  # Reminder berkala SAAT SESI berjalan digabung ke notifikasi foreground yang
  # sama (update message). Pengingat TERJADWAL (suruh mulai belajar) memakai
  # flutter_local_notifications terpisah — lihat di bawah (Fase 8).
  flutter_foreground_task: ^8.17.0

  # Font display (Space Grotesk) & body (Inter) untuk konsep "Focus Ritual".
  google_fonts: ^6.2.1

  # Export laporan AI ke PDF.
  pdf: ^3.11.1               # generate dokumen PDF
  printing: ^5.13.4          # preview/print utilities (komplementer pdf)
  path_provider: ^2.1.5      # lokasi penyimpanan file (eksplisit; sblm langsung)
  share_plus: ^10.1.4        # share PDF ke aplikasi lain (WA/Email/Drive)
  # Pengingat belajar terjadwal (Fase 8): notifikasi lokal di jam yang diatur
  # user. timezone untuk zonedSchedule yang akurat; flutter_timezone untuk
  # mendeteksi nama zona waktu device (mis. Asia/Jakarta).
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Riverpod code generator
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.4

# Konfigurasi flutter_launcher_icons (Fase 9). Sumber satu PNG gabungan
# (dasar gelap gradien near-black + ring lime "Focus Ritual"). Ring sudah
# inset dari tepi, jadi aman dipakai sebagai foreground adaptive penuh tanpa
# terpotong; background adaptive #0E0F11 menyatu dengan dasar gelap logo.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0E0F11"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - .env
    - assets/sounds/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

